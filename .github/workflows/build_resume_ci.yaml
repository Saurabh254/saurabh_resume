name: build-resume

on:
  push:
    branches: [main]
    paths:
      - "main.tex"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout source
        uses: actions/checkout@v4

      - name: cache TeX Live
        uses: actions/cache@v4
        id: cache-texlive
        with:
          path: /usr/share/texlive
          key: texlive-xelatex-${{ runner.os }}-v1

      - name: install dependencies
        run: |
          if [ "${{ steps.cache-texlive.outputs.cache-hit }}" != 'true' ]; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              texlive-xetex \
              texlive-fonts-recommended \
              texlive-fonts-extra \
              texlive-latex-extra
          fi
          sudo apt-get install -y --no-install-recommends latexmk

      - name: build resume
        run: latexmk -xelatex -interaction=nonstopmode main.tex

      - name: push pdf to target repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/saurabh254/portfolio-html.git target
          mkdir -p target/public
          cp main.pdf target/public/saurabh_resume.pdf
          cd target
          git config user.name "saurabh254"
          git config user.email "sauravvishwakarma030@gmail.com"
          git add public/saurabh_resume.pdf
          git diff --cached --quiet || git commit -m "chore: update resume pdf"
          git push